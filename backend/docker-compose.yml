version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: osean_postgres
    environment:
      POSTGRES_USER: osean
      POSTGRES_PASSWORD: osean_secret
      POSTGRES_DB: osean_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osean -d osean_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: 'postgresql://user:password@db:5432/osean'
      FRONTEND_URL: 'http://localhost:3001'
    depends_on:
      - db
  db:
    image: postgres:15
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: osean

volumes:
  postgres_data:
